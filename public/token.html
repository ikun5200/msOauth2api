<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft OAuth2 Token</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; line-height: 1.6; }
    button { background: #0078d4; color: #fff; border: 0; border-radius: 4px; padding: 10px 18px; cursor: pointer; }
    button.secondary { background: #f3f2f1; color: #222; border: 1px solid #aaa; }
    textarea { width: 100%; min-height: 96px; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 18px; margin: 16px 0; }
    .status { display: none; padding: 10px; border-radius: 4px; margin: 16px 0; }
    .status.success { display: block; background: #dff6dd; color: #107c10; }
    .status.error { display: block; background: #fde7e9; color: #a80000; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Microsoft OAuth2 Token</h1>
  <div id="status" class="status"></div>

  <div class="card" id="login-section">
    <p>点击登录后会跳转到 Microsoft 授权，完成后返回并显示 Access Token 与 Refresh Token。</p>
    <button id="login-btn">登录 Microsoft</button>
  </div>

  <div class="card hidden" id="token-section">
    <label>Access Token</label>
    <textarea id="access-token" readonly></textarea>
    <label>Refresh Token</label>
    <textarea id="refresh-token" readonly></textarea>
    <p><button id="refresh-btn">刷新 Token</button> <button class="secondary" id="clear-btn">清除</button></p>
  </div>

  <script>
    const statusBox = document.getElementById('status');
    const loginSection = document.getElementById('login-section');
    const tokenSection = document.getElementById('token-section');
    const accessTokenDisplay = document.getElementById('access-token');
    const refreshTokenDisplay = document.getElementById('refresh-token');

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function saveTokens(accessToken, refreshToken) {
      localStorage.setItem('ms_access_token', accessToken || '');
      localStorage.setItem('ms_refresh_token', refreshToken || '');
    }

    function loadTokens() {
      const accessToken = localStorage.getItem('ms_access_token');
      const refreshToken = localStorage.getItem('ms_refresh_token');

      if (accessToken || refreshToken) {
        loginSection.classList.add('hidden');
        tokenSection.classList.remove('hidden');
        accessTokenDisplay.value = accessToken || '';
        refreshTokenDisplay.value = refreshToken || '';
      } else {
        loginSection.classList.remove('hidden');
        tokenSection.classList.add('hidden');
      }
    }

    async function handleCallback() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');

      if (error) {
        showStatus(`登录失败: ${error}`, 'error');
        return;
      }

      if (!code) return;

      showStatus('正在交换 Token...', 'success');
      const response = await fetch(`/api/auth/callback?code=${encodeURIComponent(code)}`);

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || 'Failed to exchange token');
      }

      const data = await response.json();
      saveTokens(data.access_token, data.refresh_token);
      window.history.replaceState({}, document.title, window.location.pathname);
      showStatus('登录成功，Token 已获取。', 'success');
      loadTokens();
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      window.location.href = '/api/auth/login';
    });

    document.getElementById('refresh-btn').addEventListener('click', async () => {
      const refreshToken = localStorage.getItem('ms_refresh_token');
      if (!refreshToken) {
        showStatus('没有 Refresh Token', 'error');
        return;
      }

      const response = await fetch('/api/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken })
      });

      if (!response.ok) {
        showStatus('刷新失败', 'error');
        return;
      }

      const data = await response.json();
      saveTokens(data.access_token, data.refresh_token || refreshToken);
      showStatus('Token 刷新成功。', 'success');
      loadTokens();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      localStorage.removeItem('ms_access_token');
      localStorage.removeItem('ms_refresh_token');
      loadTokens();
      showStatus('已清除本地 Token。', 'success');
    });

    handleCallback().catch(err => showStatus(err.message, 'error')).finally(loadTokens);
  </script>
</body>
</html>
